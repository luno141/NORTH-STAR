name: ci

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  app:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Start stack
        run: docker compose up -d --build db redis backend worker beat frontend

      - name: Wait for backend
        run: |
          for i in $(seq 1 60); do
            if curl -fsS http://localhost:8000/api/health >/dev/null; then
              exit 0
            fi
            sleep 2
          done
          echo "Backend did not become healthy in time" >&2
          docker compose logs backend db redis
          exit 1

      - name: Verify frontend production build
        run: docker compose exec -T frontend npm run build

      - name: Install pytest runner deps
        run: python3 -m pip install --upgrade pip pytest requests

      - name: Run API integration tests
        env:
          PS13_API_BASE: http://localhost:8000
          PS13_ADMIN_KEY: orga_admin_key
          PS13_CONTRIB_KEY: carl_contrib_key
        run: pytest -q backend/tests

      - name: Smoke critical routes
        run: |
          curl -fsSI http://localhost:3000/feed | head -n 1
          curl -fsSI http://localhost:3000/admin | head -n 1
          curl -fsSI http://localhost:3000/contributors | head -n 1
          curl -fsSI http://localhost:3000/audit | head -n 1

      - name: Show logs on failure
        if: failure()
        run: docker compose logs --tail=200 backend frontend worker beat db redis

      - name: Tear down
        if: always()
        run: docker compose down -v
